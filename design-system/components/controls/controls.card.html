<!-- @dsCard group="Components" viewport="700x340" name="Controls" subtitle="Buttons, icon buttons, tabs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-base); }
  #root { padding: 22px 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 18px; }
  .lbl { font-size: var(--text-2xs); letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Tab } = window.PINHEADDesignSystem_32adb6;
  function Demo() {
    const [view, setView] = React.useState("front");
    return (
      <div>
        <div className="lbl">Button — variants</div>
        <div className="row">
          <Button variant="primary">Primary</Button>
          <Button variant="confirm">Confirm</Button>
          <Button variant="neutral">Neutral</Button>
          <Button variant="subtle">Subtle</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="outline">Outline</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="lbl">Button — sizes &amp; full-width CTA</div>
        <div className="row">
          <Button variant="subtle" size="sm">Центр зоны</Button>
          <Button variant="primary" size="md">Загрузить SVG / PNG</Button>
          <div style={{ width: 220 }}>
            <Button variant="confirm" size="cta" fullWidth>Экспорт PDF (1:1)</Button>
          </div>
        </div>
        <div className="lbl">IconButton — Lucide icons</div>
        <div className="row">
          <IconButton title="Отменить" icon="undo-2" variant="filled" />
          <IconButton title="Повторить" icon="redo-2" variant="filled" />
          <IconButton title="Выше" icon="chevron-up" size="sm" />
          <IconButton title="Ниже" icon="chevron-down" size="sm" />
          <IconButton title="Видимость" icon="eye" size="sm" />
          <IconButton title="Блокировать" icon="lock" size="sm" />
          <IconButton title="Дублировать" icon="copy" size="sm" />
          <IconButton title="Удалить" icon="trash-2" size="sm" danger />
          <IconButton title="Проверка лекала" icon="scan-search" active />
        </div>
        <div className="lbl">Tab — view selector</div>
        <div className="row" style={{ marginBottom: 0 }}>
          <Tab active={view === "front"} onClick={() => setView("front")}>Перед</Tab>
          <Tab active={view === "back"} count={2} onClick={() => setView("back")}>Спина</Tab>
          <Tab active={view === "sleeve"} onClick={() => setView("sleeve")}>Рукав (л)</Tab>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
