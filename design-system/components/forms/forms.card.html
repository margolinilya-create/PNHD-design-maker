<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-base); }
  #root { padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
  .lbl { font-size: var(--text-2xs); letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Field, Select, Switch, Swatch } = window.PINHEADDesignSystem_32adb6;
  const garments = ["", "#ffffff", "#1b1f24", "#3b4a6b", "#7a2230", "#2f5233", "#c9c4b8"];
  function Demo() {
    const [g, setG] = React.useState("#7a2230");
    const [ro, setRo] = React.useState(false);
    return (
      <div>
        <div className="grid">
          <Field label="Клиент" defaultValue="ООО «Мерч»" />
          <Field label="Ширина" numeric suffix="мм" type="number" defaultValue={120} />
          <Select label="Копировать на вид…" options={["Перед", "Спина", "Рукав (л)"]} />
        </div>
        <div style={{ marginTop: 18, display: "flex", gap: 40, alignItems: "flex-start", flexWrap: "wrap" }}>
          <div>
            <div className="lbl">Field with hint</div>
            <div style={{ width: 240 }}>
              <Field label="Заказ №" defaultValue="2026-0412" hint="печатается в обвязке тех-листа" />
            </div>
          </div>
          <div>
            <div className="lbl">Switch</div>
            <Switch checked={ro} onChange={setRo} label="Только просмотр" />
          </div>
        </div>
        <div style={{ marginTop: 18 }}>
          <div className="lbl">Swatch — цвет изделия</div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {garments.map((c) => (
              <Swatch key={c || "none"} color={c} selected={g === c} onClick={() => setG(c)} />
            ))}
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
